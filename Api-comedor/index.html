<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comedor Test Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; }
        h2 { margin-top: 0; color: #333; }
        
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
        .monitor { background: #2c3e50; color: white; }
        
        input { padding: 8px; width: 70%; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        
        .btn-green { background: #27ae60; color: white; } .btn-green:hover { background: #219150; }
        .btn-blue { background: #2980b9; color: white; } .btn-blue:hover { background: #2472a4; }
        .btn-orange { background: #e67e22; color: white; } .btn-orange:hover { background: #d35400; }
        .btn-red { background: #c0392b; color: white; } .btn-red:hover { background: #a93226; }

        #logs { height: 200px; overflow-y: auto; background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; }
        .log-item { margin-bottom: 5px; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
        
        .big-number { font-size: 3em; font-weight: bold; text-align: center; display: block; margin: 10px 0; }
        .status-badge { text-align: center; padding: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; }

        .row { display: flex; gap: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card monitor">
        <h2>📡 Monitor en Vivo</h2>
        <div class="status-badge">
            Socket: <span id="socket-status">🔴 Desconectado</span>
        </div>
        
        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <div>
                <small>TURNO ACTUAL</small>
                <span id="display-turn" class="big-number">--</span>
            </div>
            <div>
                <small>CLIENTES ACTIVOS</small>
                <span id="display-active" class="big-number">0</span>
            </div>
        </div>
        <p id="last-message" style="text-align: center; color: #f1c40f; min-height: 20px;"></p>
    </div>

    <div class="card">
        <h2>👤 Soy Cliente</h2>
        <p>Simular pedir un turno.</p>
        <div class="row">
            <input type="number" id="userId" placeholder="ID Usuario (ej: 1)" value="1">
            <button onclick="requestTurn()" class="btn-green">Pedir Turno</button>
        </div>
        <div id="user-result" style="color: green; font-weight: bold;"></div>
    </div>

    <div class="card">
        <h2>🛠️ Soy Admin / Pantalla</h2>
        <p>Controlar la orden actual.</p>
        <div class="row">
            <input type="text" id="adminOrderId" placeholder="ID de Orden (se llena solo)">
        </div>
        <div class="row">
            <button onclick="callTurn()" class="btn-blue">📢 Llamar</button>
            <button onclick="attendTurn()" class="btn-orange">🤝 Atender</button>
            <button onclick="finishTurn()" class="btn-red">✅ Finalizar</button>
        </div>
    </div>

    <div class="card" style="width: 100%;">
        <h2>📜 Logs de Eventos</h2>
        <div id="logs"></div>
        <button onclick="document.getElementById('logs').innerHTML=''" style="margin-top:5px; background:#ddd;">Limpiar</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000'; // Ajusta si tu puerto es diferente
        
        const socket = io(API_URL, {
            transports: ['websocket'] // Forzamos WebSocket para evitar error de Cluster
        });

        const statusLabel = document.getElementById('socket-status');
        const displayTurn = document.getElementById('display-turn');
        const displayActive = document.getElementById('display-active');
        const lastMessage = document.getElementById('last-message');

        socket.on('connect', () => {
            statusLabel.innerText = '🟢 Conectado';
            addLog('Socket conectado ID: ' + socket.id);
        });

        socket.on('disconnect', () => {
            statusLabel.innerText = '🔴 Desconectado';
        });

        socket.on('current_turn', (data) => {
            displayTurn.innerText = '#' + data.turnNumber;
            lastMessage.innerText = data.message;
            addLog(`📢 LLAMADA: Turno ${data.turnNumber}`);
            
            document.body.style.backgroundColor = '#dff9fb';
            setTimeout(() => document.body.style.backgroundColor = '#f4f4f9', 500);
        });

        socket.on('queue_status', (data) => {
            displayActive.innerText = data.activeUsers;
            addLog(`👥 Actualización: ${data.activeUsers} personas activas`);
        });

        socket.on('turn_expired', (data) => {
            addLog(`⏰ EXPIRADO: Turno ${data.turnNumber}`);
            lastMessage.innerText = "Turno Expirado";
            lastMessage.style.color = "red";
        });

        socket.on('turn_attended', (data) => {
             addLog(`🤝 ATENDIENDO Orden ID: ${data.orderId}`);
             lastMessage.innerText = "Atendiendo cliente...";
             lastMessage.style.color = "orange";
        });


        async function requestTurn() {
            const userId = document.getElementById('userId').value;
            try {
                const res = await fetch(`${API_URL}/api/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('user-result').innerText = `Turno: ${data.turn} (Orden ID: ${data.orderId})`;
                    // Auto-rellenar el input del admin para facilitar pruebas
                    document.getElementById('adminOrderId').value = data.orderId;
                    addLog(`✅ Turno Pedido: #${data.turn} (Orden ${data.orderId})`);
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (e) { console.error(e); alert('Error al conectar con API'); }
        }

        async function callTurn() {
            const id = document.getElementById('adminOrderId').value;
            if(!id) return alert('Falta ID de Orden');
            await sendPatch(`/api/order/${id}/call`);
        }

        async function attendTurn() {
            const id = document.getElementById('adminOrderId').value;
            if(!id) return alert('Falta ID de Orden');
            await sendPatch(`/api/order/${id}/attend`);
        }

        async function finishTurn() {
            const id = document.getElementById('adminOrderId').value;
            if(!id) return alert('Falta ID de Orden');
            await sendPatch(`/api/order/${id}/finish`);
        }

        async function sendPatch(endpoint) {
            try {
                const res = await fetch(API_URL + endpoint, { method: 'PATCH' });
                const data = await res.json();
                addLog(`⚙️ Acción: ${data.message || JSON.stringify(data)}`);
            } catch (e) {
                addLog('❌ Error API: ' + e.message);
            }
        }

        function addLog(msg) {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.prepend(div);
        }
    </script>
</body>
</html>
